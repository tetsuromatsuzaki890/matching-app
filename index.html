<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マッチングアプリ運用代行</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff;
  color: #333;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #5ec6f0, #3aa4e6);
  color: white;
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 36px;
}

.hero p {
  font-size: 18px;
  margin-top: 10px;
}

.btn {
  background: linear-gradient(135deg, #ff7a00, #ff9a3c);
  color: white;
  padding: 16px 40px;
  border-radius: 40px;
  text-decoration: none;
  display: inline-block;
  margin-top: 30px;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(255,122,0,0.4);
}

/* SECTION */
.section {
  padding: 100px 20px;
  max-width: 1000px;
  margin: auto;
}

h2 {
  text-align: center;
  font-size: 30px;
  margin-bottom: 60px;
}

/* GRID */
.grid {
  display: grid;
  gap: 24px;
}

@media(min-width:768px){
  .grid-3 {
    grid-template-columns: repeat(3,1fr);
  }
}

/* CARD */
.card {
  background: #f7f9fc;
  padding: 30px;
  border-radius: 18px;
  text-align: center;
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
}

/* RESULT */
.result {
  text-align: center;
}

.result-main {
  font-size: 56px;
  color: #ff7a00;
  font-weight: bold;
}

.result-sub {
  margin-top: 10px;
  color: #666;
}

.result img {
  width: 100%;
  max-width: 600px;
  margin-top: 40px;
  border-radius: 20px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

/* CTA */
.cta {
  background: #f0f4f8;
  text-align: center;
  padding: 120px 20px;
}

.cta h2 {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>マッチングアプリ運用代行</h1>
  <p>1マッチ300円の完全成果報酬</p>
  <a href="#" class="btn">無料相談はこちら</a>
</div>

<!-- 悩み -->
<div class="section">
  <h2>こんな悩みありませんか？</h2>

  <div class="grid grid-3">
    <div class="card">マッチしない</div>
    <div class="card">何を送ればいいかわからない</div>
    <div class="card">時間がない</div>
  </div>
</div>

<!-- 実績 -->
<div class="section result">
  <h2>実績</h2>

  <div class="result-main">1,600件以上</div>
  <div class="result-sub">累計マッチ数（東カレデートのアプリのみ）</div>

  <!-- ←ここにお前の画像入れる -->
  <img src="実績画像URLここ">
</div>

<!-- サービス -->
<div class="section">
  <h2>サービス内容</h2>

  <div class="grid grid-3">
    <div class="card">
      <h3>プロフィール設計</h3>
      <p>写真・文章を最適化</p>
    </div>

    <div class="card">
      <h3>運用代行</h3>
      <p>メッセージを代行</p>
    </div>

    <div class="card">
      <h3>日程調整</h3>
      <p>デートまで自動化</p>
    </div>
  </div>
</div>

<!-- CTA -->
<div class="cta">
  <h2>まずは無料で相談</h2>
  <a href="#" class="btn">LINEで相談</a>
</div>

</body>
</html>
