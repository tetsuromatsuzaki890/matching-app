<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マッチングアプリ運用代行</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #fff;
  color: #333;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* ヒーロー */
.hero {
  background: linear-gradient(135deg, #5ec6f0, #3aa4e6);
  color: white;
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 34px;
}

.btn {
  background: #ff7a00;
  color: white;
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
}

/* セクション */
.section {
  padding: 80px 20px;
}

h2 {
  text-align: center;
  margin-bottom: 40px;
}

/* グリッド */
.grid {
  display: grid;
  gap: 20px;
}

.card {
  background: #f7f9fc;
  padding: 20px;
  border-radius: 10px;
}

/* 画像 */
.img {
  width: 100%;
  border-radius: 12px;
  margin-top: 20px;
}

/* CTA */
.cta {
  text-align: center;
  background: #f0f4f8;
  padding: 80px 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>マッチングアプリ運用代行</h1>
  <p>出会いの母数を最大化する</p>
  <a href="#" class="btn">無料相談はこちら</a>
</div>

<!-- 悩み -->
<div class="section">
  <h2>こんな悩みありませんか？</h2>

  <div class="grid">
    <div class="card">マッチしない</div>
    <div class="card">プロフィールが弱い</div>
    <div class="card">時間がない</div>
  </div>
</div>

<!-- 実績 -->
<div class="section">
  <h2>実績</h2>
  <p style="text-align:center;">累計マッチ数 1,200件以上</p>

  <img src="https://via.placeholder.com/400x700" class="img">
</div>

<!-- サービス -->
<div class="section">
  <h2>サービス内容</h2>

  <div class="grid">
    <div class="card">
      <h3>プロフィール設計</h3>
      <p>写真・文章を最適化</p>
    </div>

    <div class="card">
      <h3>運用代行</h3>
      <p>日々の運用改善</p>
    </div>

    <div class="card">
      <h3>データ分析</h3>
      <p>数値ベースで最適化</p>
    </div>
  </div>
</div>

<!-- CTA -->
<div class="cta">
  <h2>まずは無料で相談</h2>
  <a href="#" class="btn">LINEで相談</a>
</div>

</body>
</html>
