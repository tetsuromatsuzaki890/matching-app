<!DOCTYPE html>

<head>

<style>
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #fff;
color: #333;
line-height: 1.7;
}

/* HERO */
.hero {
background: linear-gradient(135deg, #4facfe, #3a8dde);
color: white;
text-align: center;
padding: 120px 20px;
}

.hero h1 {
font-size: 28px;
line-height: 1.5;
}

.hero p {
margin-top: 15px;
opacity: 0.9;
}

.btn {
background: linear-gradient(135deg, #ff7a00, #ff9a3c);
color: white;
padding: 16px 36px;
border-radius: 40px;
display: inline-block;
margin-top: 25px;
font-weight: bold;
text-decoration: none;
box-shadow: 0 8px 20px rgba(255,122,0,0.4);
}

/* SECTION */
.section {
padding: 80px 20px;
max-width: 900px;
margin: auto;
}

h2 {
text-align: center;
margin-bottom: 40px;
}

/* アプリロゴ風 */
.app-list {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 12px;
}

.app {
padding: 10px 18px;
border-radius: 30px;
background: #f1f3f6;
font-weight: bold;
font-size: 14px;
}

/* 疑似ロゴ風 */
.tinder {
color: #ff4458;
}

.pairs {
color: #00c4cc;
}

.with {
color: #ff6699;
font-family: cursive;
}

.omiai {
color: #555;
}

/* 悩み */
.grid {
display: grid;
grid-template-columns: repeat(3,1fr);
gap: 12px;
}

.card {
background: #f3f5f8;
padding: 15px;
border-radius: 12px;
text-align: center;
font-size: 14px;
}

/* 実績 */
.result {
text-align: center;
}

.result-main {
font-size: 42px;
color: #ff7a00;
font-weight: bold;
}

.result-sub {
color: #777;
margin-top: 10px;
}

/* CTA */
.cta {
background: #f5f7fa;
text-align: center;
padding: 80px 20px;
}

/* スマホ */
@media(max-width:768px){
.grid {
grid-template-columns: 1fr;
}
}
</style>
</head>

</div>

</html>
