<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マッチングアプリ運用代行</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fb;
  color: #333;
}

/* 全体 */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* ヒーロー */
.hero {
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
  color: white;
  padding: 100px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.9;
}

/* ボタン */
.btn {
  display: inline-block;
  background: white;
  color: #2193b0;
  padding: 14px 30px;
  border-radius: 30px;
  margin-top: 20px;
  text-decoration: none;
  font-weight: bold;
}

.btn:hover {
  opacity: 0.85;
}

/* セクション */
h2 {
  text-align: center;
  margin-top: 80px;
}

/* カード */
.grid {
  display: grid;
  gap: 20px;
  margin-top: 30px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

/* 実績画像 */
.result {
  margin-top: 30px;
  text-align: center;
}

.result img {
  width: 100%;
  max-width: 500px;
  border-radius: 15px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

/* CTA */
.cta {
  text-align: center;
  margin-top: 100px;
  padding: 60px 20px;
  background: white;
}

/* フッター */
footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  padding: 40px;
}
</style>
</head>

<body>

<!-- ヒーロー -->
<div class="hero">
  <h1>マッチングアプリ運用代行</h1>
  <p>出会いの母数を最大化する運用設計</p>
  <a href="#" class="btn">無料で相談する</a>
</div>

<div class="container">

  <!-- 悩み -->
  <h2>こんな悩みありませんか？</h2>

  <div class="grid">
    <div class="card">マッチしない</div>
    <div class="card">プロフィールが弱い</div>
    <div class="card">改善方法がわからない</div>
  </div>

  <!-- サービス -->
  <h2>サービス内容</h2>

  <div class="grid">
    <div class="card">
      <h3>プロフィール設計</h3>
      <p>写真・文章を最適化</p>
    </div>

    <div class="card">
      <h3>運用代行</h3>
      <p>日々の運用を改善</p>
    </div>

    <div class="card">
      <h3>データ改善</h3>
      <p>数値ベースで最適化</p>
    </div>
  </div>

  <!-- 実績 -->
  <h2>実績</h2>
  <p style="text-align:center;">累計マッチ数 1,200件以上</p>

  <div class="result">
    <img src="result.jpg">
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <h2>まずは無料で相談</h2>
  <p>現在、少人数のみ受付中</p>
  <a href="#" class="btn">LINEで相談する</a>
</div>

<footer>
  ※成果には個人差があります
</footer>

</body>
</html>
