<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マッチングアプリ運用代行</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", sans-serif;
  background: #f7f9fc;
  color: #333;
}

/* 共通 */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  font-size: 32px;
  text-align: center;
  margin-bottom: 20px;
}

h2 {
  font-size: 24px;
  margin-top: 60px;
  text-align: center;
}

p {
  color: #555;
  text-align: center;
}

/* ヘッダー */
.hero {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
  padding: 100px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 34px;
}

.hero p {
  color: rgba(255,255,255,0.9);
}

/* カード */
.card {
  background: white;
  padding: 25px;
  border-radius: 10px;
  margin-top: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* ボタン */
.btn {
  display: inline-block;
  background: #4facfe;
  color: white;
  padding: 15px 30px;
  border-radius: 30px;
  text-decoration: none;
  margin-top: 20px;
  font-weight: bold;
}

.btn:hover {
  opacity: 0.9;
}

/* CTA */
.cta {
  text-align: center;
  padding: 80px 20px;
  background: white;
  margin-top: 80px;
}

/* フッター */
footer {
  text-align: center;
  font-size: 12px;
  color: #888;
  padding: 40px;
}
</style>
</head>

<body>

<!-- ヒーロー -->
<div class="hero">
  <h1>マッチングアプリ運用代行</h1>
  <p>時間を使わず、出会いの母数を増やす</p>
  <a href="#" class="btn">無料で相談する</a>
</div>

<div class="container">

  <!-- 悩み -->
  <h2>こんな悩みありませんか？</h2>

  <div class="card">マッチしない</div>
  <div class="card">プロフィールが弱い</div>
  <div class="card">何を改善すればいいかわからない</div>

  <!-- サービス -->
  <h2>サービス内容</h2>

  <div class="card">
    <h3>プロフィール設計</h3>
    <p>写真・文章を最適化</p>
  </div>

  <div class="card">
    <h3>運用代行</h3>
    <p>日々の運用を改善</p>
  </div>

  <div class="card">
    <h3>データ改善</h3>
    <p>数値ベースで最適化</p>
  </div>

  <!-- 実績 -->
  <h2>実績</h2>
  <p>累計マッチ数 1,200件以上</p>

</div>

<!-- CTA -->
<div class="cta">
  <h2>まずは無料で相談</h2>
  <p>現在、少人数のみ受付中</p>
  <a href="#" class="btn">LINEで相談する</a>
</div>

<footer>
  ※成果には個人差があります
</footer>

</body>
</html>
